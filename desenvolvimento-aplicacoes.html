<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desenvolvimento de Aplicações</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'base',
            themeVariables: {
                background: '#1a202c',
                primaryColor: '#2d3748',
                primaryTextColor: '#ffffff',
                primaryBorderColor: '#63b3ed',
                lineColor: '#63b3ed',
                nodeBorder: '#63b3ed',
                nodeTextColor: '#ffffff',
                edgeLabelBackground: '#2d3748',
                edgeLabelColor: '#ffffff'
            },
            flowchart: {
                htmlLabels: false,
                padding: 20,
                nodeSpacing: 60,
                rankSpacing: 80
            }
        });
    </script>
    <style>
        .lang-toggle { display: flex; gap: 4px; background: #1e1e1e; border-radius: 6px; padding: 3px; margin-left: auto; }
        .lang-toggle button { background: transparent; border: none; color: #888; cursor: pointer; padding: 4px 12px; border-radius: 4px; font-size: 0.85rem; font-weight: 500; transition: all 0.2s; }
        .lang-toggle button.active { background: #007acc; color: #fff; }
        .lang-toggle button:hover:not(.active) { color: #ccc; }
        nav ul { display: flex; align-items: center; list-style: none; gap: 16px; padding: 0; margin: 0; }
        #mermaid-container { background: #1a202c; border-radius: 8px; padding: 32px; overflow-x: auto; min-height: 600px; }
        #mermaid-container svg { max-width: 100%; height: auto; display: block; margin: 0 auto; }
        #mermaid-container svg text { fill: #ffffff !important; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important; font-size: 13px !important; font-weight: 600 !important; }
        #mermaid-container svg .node rect { fill: #2d3748 !important; stroke: #63b3ed !important; stroke-width: 2px !important; rx: 6px !important; }
        #mermaid-container svg .node polygon { fill: #2d3748 !important; stroke: #63b3ed !important; stroke-width: 2px !important; }
        #mermaid-container svg .edgePath path { stroke: #63b3ed !important; stroke-width: 2px !important; fill: none !important; }
        #mermaid-container svg .marker { fill: #63b3ed !important; stroke: #63b3ed !important; }
        @media (max-width: 768px) {
            nav ul { flex-wrap: nowrap; overflow-x: auto; gap: 8px; padding: 0.5rem; }
            nav ul li a { font-size: 0.7rem; white-space: nowrap; }
            .lang-toggle button { padding: 3px 8px; font-size: 0.7rem; }
            #mermaid-container { min-height: 350px; padding: 12px; }
            .tech-box { padding: 12px; }
            .tech-box li { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">Sobre</a></li>
                <li><a href="index.html#skills">Habilidades</a></li>
                <li><a href="index.html#experience">Experiência</a></li>
                <li><a href="index.html#contact">Contato</a></li>
                <li>
                    <div class="lang-toggle">
                        <button class="active" onclick="setLanguage('pt')" id="lang-pt">PT</button>
                        <button onclick="setLanguage('en')" id="lang-en">EN</button>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <main id="main-content"></main>

    <footer>
        <div class="footer-content">
            <p id="footer-text">&copy; 2026 Marcus Costa. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        const diagramDefs = {
            pt: `graph LR
                LB["NGINX / HAProxy"]
                GW["Kong / Spring Gateway"]
                IAM["Keycloak / Azure AD"]
                ERP["Java / .NET"]
                CRM["Node.js / Python"]
                BI["Power BI / Python"]
                DB[("Oracle / SQL Server")]
                RC[("Redis")]
                DW[("Snowflake / Hadoop")]
                MQ["Kafka / RabbitMQ"]
                WK[".NET / Java"]
                MN["Prometheus / Grafana"]

                LB --> GW
                GW --> IAM
                GW --> ERP
                GW --> CRM
                GW --> BI
                ERP --> DB
                CRM --> RC
                BI --> DW
                ERP --> MQ
                CRM --> MQ
                MQ --> WK
                GW --> MN`,
            en: `graph LR
                LB["NGINX / HAProxy"]
                GW["Kong / Spring Gateway"]
                IAM["Keycloak / Azure AD"]
                ERP["Java / .NET"]
                CRM["Node.js / Python"]
                BI["Power BI / Python"]
                DB[("Oracle / SQL Server")]
                RC[("Redis")]
                DW[("Snowflake / Hadoop")]
                MQ["Kafka / RabbitMQ"]
                WK[".NET / Java"]
                MN["Prometheus / Grafana"]

                LB --> GW
                GW --> IAM
                GW --> ERP
                GW --> CRM
                GW --> BI
                ERP --> DB
                CRM --> RC
                BI --> DW
                ERP --> MQ
                CRM --> MQ
                MQ --> WK
                GW --> MN`
        };

        const content = {
            pt: {
                title: "Desenvolvimento de Aplicações",
                desc: "O desenvolvimento de aplicações envolve a criação de software que atende a necessidades específicas dos usuários. Isso inclui desde a concepção da ideia, passando pelo design, codificação, testes e manutenção.",
                techTitle: "Tecnologias Corporativas",
                techs: [
                    '<i data-lucide="code"></i> Front-end: React, Angular, Vue.js, Blazor',
                    '<i data-lucide="server"></i> Backend: Java (Spring Boot), .NET (C#), Node.js, Python',
                    '<i data-lucide="database"></i> Bancos de Dados: Oracle, SQL Server, PostgreSQL, MongoDB',
                    '<i data-lucide="cloud"></i> Cloud & Infra: AWS, Azure, Docker, Kubernetes, Terraform',
                    '<i data-lucide="box"></i> Mensageria & Stream: Apache Kafka, RabbitMQ, Azure Service Bus',
                    '<i data-lucide="bar-chart"></i> BI & Analytics: Power BI, Snowflake, Hadoop, Elastic Stack',
                    '<i data-lucide="shield"></i> IAM & Seguranca: Keycloak, Azure AD, OAuth2, JWT',
                    '<i data-lucide="activity"></i> Observabilidade: Prometheus, Grafana, ELK, OpenTelemetry'
                ],
                diagramTitle: "Fluxo Corporativo (Arquitetura de Microsservicos)",
                footer: "&copy; 2024 Marcus Costa. Todos os direitos reservados.",
                nav: ["Home", "Sobre", "Habilidades", "Experiencia", "Contato"]
            },
            en: {
                title: "Application Development",
                desc: "Application development involves creating software that meets specific user needs. This includes everything from ideation through design, coding, testing, and maintenance.",
                techTitle: "Enterprise Technologies",
                techs: [
                    '<i data-lucide="code"></i> Front-end: React, Angular, Vue.js, Blazor',
                    '<i data-lucide="server"></i> Backend: Java (Spring Boot), .NET (C#), Node.js, Python',
                    '<i data-lucide="database"></i> Databases: Oracle, SQL Server, PostgreSQL, MongoDB',
                    '<i data-lucide="cloud"></i> Cloud & Infra: AWS, Azure, Docker, Kubernetes, Terraform',
                    '<i data-lucide="box"></i> Messaging & Stream: Apache Kafka, RabbitMQ, Azure Service Bus',
                    '<i data-lucide="bar-chart"></i> BI & Analytics: Power BI, Snowflake, Hadoop, Elastic Stack',
                    '<i data-lucide="shield"></i> IAM & Security: Keycloak, Azure AD, OAuth2, JWT',
                    '<i data-lucide="activity"></i> Observability: Prometheus, Grafana, ELK, OpenTelemetry'
                ],
                diagramTitle: "Corporate Flow (Microservices Architecture)",
                footer: "&copy; 2024 Marcus Costa. All rights reserved.",
                nav: ["Home", "About", "Skills", "Experience", "Contact"]
            }
        };

        async function renderMermaidSVG(def) {
            const { svg } = await mermaid.render('mermaid-render-' + Date.now(), def);
            return svg;
        }

        function buildPageHTML(lang) {
            const c = content[lang];
            const techLis = c.techs.map(t => '<li>' + t + '</li>').join('');
            return `<section id="development"><h1>${c.title}</h1><p>${c.desc}</p><h2>${c.techTitle}</h2><div class="tech-box"><ul>${techLis}</ul></div><h2>${c.diagramTitle}</h2><div id="mermaid-container"></div></section>`;
        }

        let svgCache = {};

        async function setLanguage(lang) {
            document.getElementById('lang-pt').classList.toggle('active', lang === 'pt');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en-US';
            document.title = content[lang].title;
            document.querySelectorAll('nav ul li a').forEach((a, i) => { const h = ['index.html', 'index.html#about', 'index.html#skills', 'index.html#experience', 'index.html#contact']; if (i < content[lang].nav.length) { a.textContent = content[lang].nav[i]; a.href = h[i]; } });
            document.getElementById('footer-text').innerHTML = content[lang].footer;
            document.getElementById('main-content').innerHTML = buildPageHTML(lang);
            if (window.lucide) lucide.createIcons();
            const c = document.getElementById('mermaid-container');
            if (c) {
                if (svgCache[lang]) { c.innerHTML = svgCache[lang]; }
                else { c.innerHTML = '<p style="color:#a0aec0;text-align:center;">Carregando...</p>'; try { const s = await renderMermaidSVG(diagramDefs[lang]); svgCache[lang] = s; c.innerHTML = s; } catch (e) { c.innerHTML = '<p style="color:#a0aec0;text-align:center;">Erro.</p>'; console.error(e); } }
            }
            localStorage.setItem('preferred-lang', lang);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const l = localStorage.getItem('preferred-lang') || 'pt';
            document.getElementById('lang-pt').classList.add('active');
            document.getElementById('main-content').innerHTML = buildPageHTML(l);
            if (window.lucide) lucide.createIcons();
            const c = document.getElementById('mermaid-container');
            if (c) { c.innerHTML = '<p style="color:#a0aec0;text-align:center;">Carregando...</p>'; try { const s = await renderMermaidSVG(diagramDefs[l]); svgCache[l] = s; c.innerHTML = s; } catch (e) { c.innerHTML = '<p style="color:#a0aec0;text-align:center;">Erro.</p>'; console.error(e); } }
        });
    </script>
</body>
</html>
